<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#cc1a1a">
<title>Roly's — Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#cc1a1a; --red-dark:#a81212; --red-faint:#fff5f5;
  --white:#fff; --off:#f8f8f8; --g1:#f2f2f2; --g2:#e8e8e8;
  --g3:#d0d0d0; --g4:#999; --g5:#555; --text:#1c1c1c;
  --green:#1d8a4a; --green-bg:#edf7f2; --amber:#c97a00; --amber-bg:#fff8e8;
  --radius:10px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans',sans-serif; background:var(--g1); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; }

/* SETUP */
#setup {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:28px 20px; gap:16px; text-align:center;
}
.setup-logo { font-size:48px; }
.setup-title { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--red); }
.setup-sub { font-size:14px; color:var(--g4); margin-bottom:8px; }
.setup-card { background:var(--white); border-radius:16px; padding:20px; width:100%; max-width:340px; box-shadow:0 2px 12px rgba(0,0,0,0.08); text-align:left; }
.setup-card label { font-size:12px; font-weight:600; color:var(--g4); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
.setup-input { width:100%; background:var(--g1); border:1.5px solid var(--g2); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; padding:10px 12px; outline:none; margin-bottom:8px; }
.setup-input:focus { border-color:var(--red); }
.fb-hint { font-size:11px; color:var(--g4); margin-bottom:12px; line-height:1.4; }
.btn-entrar { width:100%; background:var(--red); border:none; color:#fff; padding:13px; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }

/* APP */
#app { flex:1; display:none; flex-direction:column; overflow:hidden; }

header {
  background:var(--white); border-bottom:3px solid var(--red);
  padding:10px 14px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.08); gap:10px;
}
.hdr-title { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--red); letter-spacing:1px; }
.hdr-sub { font-size:11px; color:var(--g4); }
.hdr-right { display:flex; align-items:center; gap:10px; }
.conn-pill {
  font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px;
  background:var(--g2); color:var(--g4);
}
.conn-pill.ok { background:var(--green-bg); color:var(--green); }
.conn-pill.err { background:#fdeaea; color:var(--red); }

.btn-print-hdr {
  background:var(--red); color:#fff; border:none; padding:7px 12px;
  border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:5px;
}
.btn-print-hdr:active { background:var(--red-dark); }

/* STATS BAR */
.stats-bar {
  background:var(--white); border-bottom:1px solid var(--g2);
  padding:10px 14px; display:flex; gap:16px;
}
.stat { text-align:center; }
.stat-val { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--red); line-height:1; }
.stat-lbl { font-size:10px; color:var(--g4); text-transform:uppercase; letter-spacing:0.5px; }

/* COMANDAS LIST */
.list-wrap { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }

.cmd-card {
  background:var(--white); border-radius:var(--radius);
  border-left:4px solid var(--amber);
  box-shadow:0 1px 4px rgba(0,0,0,0.09);
  overflow:hidden;
}
.cmd-card.lista { border-left-color:var(--green); }
.cmd-card.entregado { border-left-color:var(--g3); opacity:0.6; }

.cmd-hdr {
  padding:10px 12px 8px;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.cmd-mesa { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; }
.cmd-meta { font-size:11px; color:var(--g4); }
.cmd-total { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--red); }

.cmd-items {
  padding:0 12px 10px;
  font-size:13px; color:var(--g5); line-height:1.6;
}
.cmd-items .item-line { display:flex; justify-content:space-between; }
.cmd-items .item-price { color:var(--red); font-weight:600; }
.cmd-nota { margin:6px 12px 8px; padding:7px 9px; background:var(--amber-bg); border-radius:7px; font-size:12px; color:#7a5c1a; }

.cmd-actions {
  border-top:1px solid var(--g2); padding:8px 10px;
  display:flex; gap:6px; background:var(--off);
}
.btn-estado {
  flex:1; padding:8px; border-radius:8px; font-size:12px; font-weight:700;
  cursor:pointer; border:none; transition:all 0.1s;
}
.btn-pendiente { background:var(--amber-bg); color:var(--amber); border:1.5px solid var(--amber); }
.btn-lista { background:var(--green-bg); color:var(--green); border:1.5px solid var(--green); }
.btn-entregado { background:var(--g2); color:var(--g5); border:1.5px solid var(--g3); }
.btn-imprimir { background:var(--red); color:#fff; border:none; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; }
.btn-eliminar { background:transparent; border:1.5px solid var(--g3); color:var(--g4); padding:8px 10px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; }

/* EMPTY */
.empty-list { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--g4); gap:8px; padding:40px; }
.empty-icon { font-size:48px; }
.empty-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; }
.empty-sub { font-size:13px; }

/* ALERTA NUEVA COMANDA */
.alerta-ov {
  display:none; position:fixed; inset:0; background:rgba(29,138,74,0.92);
  z-index:500; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; text-align:center;
}
.alerta-ov.show { display:flex; animation:blink 0.3s; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.alerta-icon { font-size:60px; }
.alerta-title { font-family:'Bebas Neue',sans-serif; font-size:28px; color:#fff; letter-spacing:1px; }
.alerta-sub { font-size:15px; color:rgba(255,255,255,0.85); }
.btn-ok-alerta { background:#fff; color:var(--green); border:none; padding:12px 28px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }

.toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:#fff; padding:9px 18px; border-radius:18px; font-size:13px; font-weight:600; opacity:0; transition:all 0.22s; z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { background:var(--red); }

/* Filtro tabs */
.filter-bar { background:var(--white); border-bottom:1px solid var(--g2); padding:6px 10px; display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.ftab { flex-shrink:0; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid var(--g3); background:var(--white); color:var(--g5); }
.ftab.active { background:var(--red); color:#fff; border-color:var(--red); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-logo">🍳</div>
  <div class="setup-title">Birria Roly's — Caja</div>
  <p class="setup-sub">Pantalla de caja e impresión</p>
  <div class="setup-card">
    <label>URL de Firebase</label>
    <input class="setup-input" id="fbUrl" type="url" placeholder="https://tu-proyecto.firebaseio.com">
    <p class="fb-hint">La misma URL que configuraste en la app de mesero</p>
    <button class="btn-entrar" onclick="entrar()">Conectar →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="hdr-title">🍳 Caja — Roly's</div>
      <div class="hdr-sub" id="hdrSub">Esperando comandas...</div>
    </div>
    <div class="hdr-right">
      <div class="conn-pill" id="connPill">●  Conectando</div>
      <button class="btn-print-hdr" onclick="connectPrinter()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Impresora
      </button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statPendientes">0</div><div class="stat-lbl">Pendientes</div></div>
    <div class="stat"><div class="stat-val" id="statListas">0</div><div class="stat-lbl">Listas</div></div>
    <div class="stat"><div class="stat-val" id="statHoy" style="color:var(--green)">$0</div><div class="stat-lbl">Vendido hoy</div></div>
  </div>

  <div class="filter-bar">
    <button class="ftab active" onclick="setFilter('todas',this)">Todas</button>
    <button class="ftab" onclick="setFilter('pendiente',this)">Pendientes</button>
    <button class="ftab" onclick="setFilter('lista',this)">Listas</button>
    <button class="ftab" onclick="setFilter('entregado',this)">Entregadas</button>
  </div>

  <div class="list-wrap" id="listWrap">
    <div class="empty-list">
      <div class="empty-icon">🧾</div>
      <div class="empty-title">Sin comandas</div>
      <div class="empty-sub">Las comandas de los meseros aparecerán aquí</div>
    </div>
  </div>
</div>

<!-- ALERTA NUEVA COMANDA -->
<div class="alerta-ov" id="alertaOv">
  <div class="alerta-icon">🔔</div>
  <div class="alerta-title">¡Nueva comanda!</div>
  <div class="alerta-sub" id="alertaSub"></div>
  <button class="btn-ok-alerta" onclick="closeAlerta()">Ver → </button>
</div>

<div class="toast" id="toast"></div>

<script>
let fbUrl = '';
let comandas = {}; // key: comanda object
let filter = 'todas';
let btDevice = null, btChar = null;
let polling = null;
let lastKnownKeys = new Set();
let totalHoy = 0;

// SETUP
function entrar() {
  const url = document.getElementById('fbUrl').value.trim().replace(/\/$/, '');
  if (!url || !url.startsWith('https://')) { toast('Ingresa la URL de Firebase', true); return; }
  fbUrl = url;
  localStorage.setItem('rolys_caja_fb', fbUrl);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  startPolling();
}

window.addEventListener('load', () => {
  const f = localStorage.getItem('rolys_caja_fb');
  if (f) { document.getElementById('fbUrl').value = f; }
  if (window.location.hostname.includes('claude.ai')) {
    setTimeout(() => {
      alert('⚠️ AVISO: Estás abriendo caja.html desde claude.ai.\n\nBluetooth y Firebase NO funcionan desde aquí.\n\nDescarga caja.html y ábrelo desde Chrome directamente en el Android:\nExplorador de archivos → caja.html → Abrir con Chrome');
    }, 800);
  }
});

// POLLING FIREBASE
function startPolling() {
  poll();
  polling = setInterval(poll, 3000); // Actualiza cada 3s
}

async function poll() {
  try {
    const r = await fetch(`${fbUrl}/comandas.json`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    document.getElementById('connPill').className = 'conn-pill ok';
    document.getElementById('connPill').textContent = '●  Conectado';

    const newCmds = data || {};
    // Detectar nuevas comandas
    for (const key of Object.keys(newCmds)) {
      if (!lastKnownKeys.has(key)) {
        // Es nueva
        showAlerta(newCmds[key]);
        playBeep();
        if (btChar) printTicket(newCmds[key]); // Auto-imprimir si hay impresora
        lastKnownKeys.add(key);
      }
    }
    comandas = newCmds;
    renderList();
    updateStats();
  } catch(e) {
    document.getElementById('connPill').className = 'conn-pill err';
    const isClaude = window.location.hostname.includes('claude.ai');
    document.getElementById('connPill').textContent = isClaude ? '⚠️ Abrir desde Chrome' : '●  Sin conexión';
  }
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  let entries = Object.entries(comandas)
    .sort(([,a],[,b]) => b.timestamp - a.timestamp);

  if (filter !== 'todas') entries = entries.filter(([,c]) => c.estado === filter);

  if (!entries.length) {
    wrap.innerHTML = `<div class="empty-list">
      <div class="empty-icon">🧾</div>
      <div class="empty-title">Sin comandas</div>
      <div class="empty-sub">${filter==='todas'?'Las comandas de los meseros aparecerán aquí':'No hay comandas con este estado'}</div>
    </div>`;
    return;
  }

  wrap.innerHTML = entries.map(([key, c]) => {
    const estadoClass = c.estado === 'lista' ? 'lista' : c.estado === 'entregado' ? 'entregado' : '';
    const itemsHtml = c.items.map(i =>
      `<div class="item-line"><span>${i.qty}x ${i.nombre}</span><span class="item-price">$${i.subtotal}</span></div>`
    ).join('');

    const estadoBtns = `
      <button class="btn-estado btn-pendiente ${c.estado==='pendiente'?'':'opacity-50'}"
        onclick="setEstado('${key}','pendiente')">⏳ Pendiente</button>
      <button class="btn-estado btn-lista ${c.estado==='lista'?'':'opacity-50'}"
        onclick="setEstado('${key}','lista')">✅ Lista</button>
      <button class="btn-estado btn-entregado ${c.estado==='entregado'?'':'opacity-50'}"
        onclick="setEstado('${key}','entregado')">🤝 Entregada</button>
    `;

    return `<div class="cmd-card ${estadoClass}" id="cmd-${key}">
      <div class="cmd-hdr">
        <div>
          <div class="cmd-mesa">Mesa ${c.mesa}</div>
          <div class="cmd-meta">${c.mesero} · ${c.hora}</div>
        </div>
        <div class="cmd-total">$${c.total}</div>
      </div>
      <div class="cmd-items">${itemsHtml}</div>
      ${c.nota ? `<div class="cmd-nota">📝 ${c.nota}</div>` : ''}
      <div class="cmd-actions">
        ${estadoBtns}
        <button class="btn-imprimir" onclick="printTicket(${JSON.stringify(c).replace(/"/g,'&quot;')})">🖨️</button>
        <button class="btn-eliminar" onclick="eliminarComanda('${key}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  const vals = Object.values(comandas);
  document.getElementById('statPendientes').textContent = vals.filter(c=>c.estado==='pendiente').length;
  document.getElementById('statListas').textContent = vals.filter(c=>c.estado==='lista').length;
  const total = vals.reduce((s,c)=>s+c.total,0);
  document.getElementById('statHoy').textContent = '$'+total;
  const n = vals.length;
  document.getElementById('hdrSub').textContent = n > 0 ? `${n} comanda${n!==1?'s':''} hoy` : 'Esperando comandas...';
}

async function setEstado(key, estado) {
  try {
    await fetch(`${fbUrl}/comandas/${key}/estado.json`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(estado)
    });
    comandas[key].estado = estado;
    renderList(); updateStats();
  } catch(e) { toast('Error al actualizar', true); }
}

async function eliminarComanda(key) {
  if (!confirm('¿Eliminar esta comanda?')) return;
  try {
    await fetch(`${fbUrl}/comandas/${key}.json`, { method:'DELETE' });
    delete comandas[key];
    lastKnownKeys.delete(key);
    renderList(); updateStats();
  } catch(e) { toast('Error al eliminar', true); }
}

// ALERTA
function showAlerta(c) {
  document.getElementById('alertaSub').textContent = `Mesa ${c.mesa} · ${c.mesero} · $${c.total}`;
  document.getElementById('alertaOv').classList.add('show');
}
function closeAlerta() { document.getElementById('alertaOv').classList.remove('show'); }

// BEEP
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.4);
  } catch(e) {}
}

// IMPRESORA BLUETOOTH
async function connectPrinter() {
  if (!('bluetooth' in navigator)) { toast('Este navegador no soporta Bluetooth', true); return; }
  try {
    toast('Buscando impresora…');
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '000018f0-0000-1000-8000-00805f9b34fb',
        '0000ff00-0000-1000-8000-00805f9b34fb',
        '0000fff0-0000-1000-8000-00805f9b34fb'
      ]
    });
    const server = await btDevice.gatt.connect();
    const SVCS = [
      'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
      '000018f0-0000-1000-8000-00805f9b34fb',
      '0000ff00-0000-1000-8000-00805f9b34fb',
      '0000fff0-0000-1000-8000-00805f9b34fb'
    ];
    btChar = null;
    for (const sid of SVCS) {
      try {
        const svc = await server.getPrimaryService(sid);
        const chars = await svc.getCharacteristics();
        btChar = chars.find(c=>c.properties.write||c.properties.writeWithoutResponse);
        if (btChar) break;
      } catch{}
    }
    if (btChar) {
      toast('Impresora conectada ✓');
      document.getElementById('connPill').textContent = '🖨️ Impresora OK';
    } else {
      toast('Impresora encontrada pero sin canal de escritura', true);
    }
  } catch(e) {
    if (e.name === 'NotFoundError') {
      // Usuario canceló el selector, ok
    } else if (e.name === 'SecurityError') {
      toast('Bluetooth bloqueado. Abre desde Chrome directo, no desde claude.ai', true);
    } else if (e.name === 'NotSupportedError') {
      toast('Chrome no tiene Bluetooth. Actívalo en chrome://flags', true);
    } else {
      toast('Error Bluetooth: ' + e.message, true);
    }
    console.error('BT error:', e.name, e.message);
  }
}

function buildTicket(c) {
  const W = 32;
  const center = (s)=>{const sp=Math.max(0,Math.floor((W-s.length)/2));return ' '.repeat(sp)+s;};
  let L = [];
  L.push('================================');
  L.push(center('BIRRIA ROLYS COAPA'));
  L.push('================================');
  L.push(`${c.hora || ''}`);
  L.push(`Mesa: ${c.mesa}  Mesero: ${c.mesero}`);
  L.push('--------------------------------');
  for (const item of c.items) {
    const nm = `${item.qty}x ${item.nombre}`;
    const pr = `$${item.subtotal}`;
    if (nm.length + 1 + pr.length > W) {
      L.push(nm.slice(0,W));
      L.push(' '.repeat(Math.max(0,W-pr.length))+pr);
    } else {
      const sp = Math.max(1,W-nm.length-pr.length);
      L.push(nm+' '.repeat(sp)+pr);
    }
  }
  L.push('================================');
  L.push(center(`TOTAL: $${c.total}`));
  L.push('================================');
  if (c.nota) { L.push('NOTA:'); L.push(c.nota); L.push('--------------------------------'); }
  L.push(''); L.push(''); L.push('');
  return L.join('\n');
}

async function printTicket(c) {
  // Si es string (desde onclick), parsear
  if (typeof c === 'string') { try { c = JSON.parse(c); } catch{} }
  const txt = buildTicket(c);

  if (btChar) {
    try {
      const enc = new TextEncoder();
      const write = async(data)=>{
        if(btChar.properties.writeWithoutResponse) await btChar.writeValueWithoutResponse(data);
        else await btChar.writeValue(data);
      };
      await write(new Uint8Array([0x1B,0x40]));
      const bytes = enc.encode(txt);
      for(let i=0;i<bytes.length;i+=100) await write(bytes.slice(i,i+100));
      await write(new Uint8Array([0x1D,0x56,0x42,0x00]));
      toast('Ticket impreso ✓');
      return;
    } catch(e) { toast('Error al imprimir',true); btChar=null; }
  }

  // Fallback ventana del navegador
  const w = window.open('','_blank','width=340,height=620');
  if(!w){toast('Permite ventanas emergentes',true);return;}
  w.document.write(`<!DOCTYPE html><html><head><title>Ticket</title>
  <style>*{margin:0;padding:0;}body{font-family:'Courier New',monospace;font-size:12pt;line-height:1.35;padding:6mm;background:white;color:black;width:80mm;}pre{white-space:pre-wrap;word-break:break-word;}@media print{@page{size:80mm auto;margin:3mm;}body{width:auto;}}</style></head>
  <body><pre>${txt.replace(/</g,'&lt;')}</pre>
  <script>window.onload=()=>setTimeout(()=>window.print(),200);<\/script></body></html>`);
  w.document.close();
}

function toast(msg,err=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(err?' err':'');clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

// Restaurar FB URL
window.addEventListener('load',()=>{
  const f=localStorage.getItem('rolys_caja_fb');
  if(f) document.getElementById('fbUrl').value=f;
});
</script>
